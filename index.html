<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>レーン避けゲーム</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: sans-serif;
        }
        #game-container {
            position: relative;
            width: 400px;
            height: 500px;
            background-color: #eee;
            border: 4px solid #333;
            overflow: hidden;
        }
        /* 資料に基づいたレーン設定 */
        .lane {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
        }
        .lane-gray { left: 0; background-color: #cccccc; } /* 灰色のレーン */
        .lane-blue { left: 50%; background-color: #add8e6; } /* 水色のレーン */

        /* スコア表示 */
        #score-display {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 20px;
            font-weight: bold;
            z-index: 10;
        }

        /* プレイヤー（茶色い物体） */
        #player {
            position: absolute;
            bottom: 20px;
            width: 60px;
            height: 30px;
            background-color: #8b4513; /* 茶色 */
            border-radius: 5px;
            transition: left 0.1s ease-out;
        }

        /* 障害物（赤い物体） */
        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4444; /* 赤 */
            border-radius: 50%;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-display">スコア: 0</div> 
        <div class="lane lane-gray"></div>
        <div class="lane lane-blue"></div>
        <div id="player"></div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreElement = document.getElementById('score-display');
        
        let score = 0; [cite: 1]
        let playerX = 170; // プレイヤーの初期位置
        let gameActive = true;

        // プレイヤーの操作（左右キーまたはマウス）
        document.addEventListener('mousemove', (e) => {
            if (!gameActive) return;
            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left - (player.offsetWidth / 2);
            // 動かせる範囲を制限
            if (x < 0) x = 0;
            if (x > container.offsetWidth - player.offsetWidth) x = container.offsetWidth - player.offsetWidth;
            playerX = x;
            player.style.left = playerX + 'px';
        });

        // 障害物の生成
        function createObstacle() {
            if (!gameActive) return;

            const obstacle = document.createElement('div');
            obstacle.className = 'obstacle';
            
            // どちらのレーンに出現するかランダム決定
            const laneNum = Math.random() > 0.5 ? 0 : 1;
            const startX = laneNum === 0 ? 70 : 270; // レーンの中央付近
            
            obstacle.style.left = startX + 'px';
            obstacle.style.top = '-50px';
            container.appendChild(obstacle);

            let topPos = -50;
            const fallInterval = setInterval(() => {
                if (!gameActive) {
                    clearInterval(fallInterval);
                    return;
                }

                topPos += 5; // 落下速度
                obstacle.style.top = topPos + 'px';

                // 衝突判定
                const pRect = player.getBoundingClientRect();
                const oRect = obstacle.getBoundingClientRect();

                if (oRect.left < pRect.right &&
                    oRect.right > pRect.left &&
                    oRect.top < pRect.bottom &&
                    oRect.bottom > pRect.top) {
                    gameOver();
                }

                // 画面外に出た場合
                if (topPos > container.offsetHeight) {
                    clearInterval(fallInterval);
                    container.removeChild(obstacle);
                    score++; [cite: 1]
                    scoreElement.innerText = "スコア: " + score; [cite: 1]
                }
            }, 20);
        }

        function gameOver() {
            gameActive = false;
            alert("ゲームオーバー！ スコア: " + score);
            location.reload(); // ページをリロードしてリスタート
        }

        // 1秒ごとに障害物を生成
        setInterval(createObstacle, 1000);

    </script>
</body>
</html>
