<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>食いしん坊ねこちゃん</title>

<link href="https://fonts.googleapis.com/css2?family=Yomogi&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  background:#f5e6d3;
  text-align:center;
  font-family:'Yomogi',cursive;
}

h1{
  margin:10px 0 5px;
  font-size:32px;
  color:#e6c9a8;

  text-shadow:
   -3px -3px 0 #fff,
    3px -3px 0 #fff,
   -3px  3px 0 #fff,
    3px  3px 0 #fff,
    0 4px 8px rgba(0,0,0,0.2);
}

#scoreBox{
  background:white;
  display:inline-block;
  padding:6px 16px;
  border-radius:999px;
  margin-bottom:5px;
}

#like,#timer,#lives{
  margin-top:5px;
  font-size:18px;
}

canvas{
  background:#fff;
  border:3px solid #d8bfa3;
  border-radius:18px;
  touch-action:none;
}
</style>
</head>

<body>

<h1>🍽️ 食いしん坊ねこちゃん 🐈</h1>

<div id="scoreBox">
スコア：<span id="score">0</span>
</div>

<div id="like">
だいすき：🐟 🍅 🍌
</div>

<div id="timer">
⏳ <span id="time">03:00</span>
</div>

<canvas id="game" width="360" height="500"></canvas>

<div id="lives"></div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const scoreEl = document.getElementById("score");
const timeEl = document.getElementById("time");
const livesEl = document.getElementById("lives");

const lanes = 6;
const laneWidth = canvas.width / lanes;

let score = 0;
let lives = 9;
let timer = 180;
let frame = 0;

let gameOver = false;
let clear = false;

let lastBad = "🍫";

let falling = [];
let effects = [];

const badMessages = {
  "🍫":"チョコレートに含まれるテオブロミンは、猫では代謝が遅く中毒を引き起こします。",
  "🧅":"たまねぎに含まれる有機硫黄化合物（アリルプロピルジスルフィドなど）は、赤血球を酸化させ溶血性貧血を起こします。",
  "🍇":"ぶどうは原因物質は特定されていませんが、摂取により急性腎障害を引き起こすことがあります。"
};

const cat = {
  lane:2,
  happyTimer:0,
  sadTimer:0,
  bounce:0,
  shake:0,
  power:0
};

let bag = [];

function refillBag(){

  bag = [
    "🐟","🍅","🍌",
    "🧅","🍫","🍇",

    "🐟","🍅","🍌",
    "🧅","🍫","🍇",

    "🐟","🍅","🍌",

    "🚬"
  ];

  bag.sort(()=>Math.random()-0.5);
}

function getFromBag(){

  if(bag.length===0){
    refillBag();
  }

  return bag.pop();
}

function updateLives(){

  let text = "";

  for(let i=0;i<9;i++){
    text += i<lives ? "🐈" : "🐈‍⬛";
  }

  livesEl.textContent = text;
}

function formatTime(sec){

  let m =
    String(Math.floor(sec/60))
    .padStart(2,"0");

  let s =
    String(sec%60)
    .padStart(2,"0");

  return `${m}:${s}`;
}

function spawnItem(){

  if(gameOver || clear) return;

  const emoji = getFromBag();

  falling.push({
    lane:Math.floor(Math.random()*lanes),
    y:0,
    emoji,
    good:["🐟","🍅","🍌"].includes(emoji),
    special:emoji==="🚬"
  });
}

function addSparkle(x,y){

  for(let i=0;i<4;i++){

    effects.push({
      cx:x,
      cy:y,
      angle:Math.random()*Math.PI*2,
      radius:10+Math.random()*10,
      speed:0.03,
      life:18,
      alpha:0.2,
      size:4,
      color:"white"
    });
  }
}

function addSpecial(x,y){

  for(let i=0;i<6;i++){

    effects.push({
      cx:x,
      cy:y,
      angle:Math.random()*Math.PI*2,
      radius:15+Math.random()*10,
      speed:0.04,
      life:20,
      alpha:0.4,
      size:4,
      color:"gold",
      special:true
    });
  }
}

function addBurst(x,y){

  for(let i=0;i<3;i++){

    effects.push({
      x,
      y,
      dx:(Math.random()-0.5)*2,
      dy:(Math.random()-0.5)*2,
      life:12
    });
  }
}

function addHeart(x,y){

  for(let i=0;i<5;i++){

    effects.push({
      x,
      y,
      dx:(Math.random()-0.5),
      dy:-Math.random()*2,
      life:25,
      heart:true
    });
  }
}

function resetGame(){

  score = 0;
  lives = 9;
  timer = 180;
  frame = 0;

  gameOver = false;
  clear = false;

  lastBad = "🍫";

  falling = [];
  effects = [];

  cat.lane = 2;
  cat.happyTimer = 0;
  cat.sadTimer = 0;
  cat.bounce = 0;
  cat.shake = 0;
  cat.power = 0;

  scoreEl.textContent = 0;
  timeEl.textContent = "03:00";

  updateLives();

  refillBag();
}

function wrapText(text,x,y,maxWidth,lineHeight){

  let line = "";

  for(let i=0;i<text.length;i++){

    let test = line + text[i];

    if(ctx.measureText(test).width > maxWidth){

      ctx.fillText(line,x,y);

      line = text[i];

      y += lineHeight;

    }else{

      line = test;
    }
  }

  ctx.fillText(line,x,y);
}

function roundRect(x,y,w,h,r,fill){

  ctx.beginPath();

  ctx.moveTo(x+r,y);
  ctx.lineTo(x+w-r,y);
  ctx.quadraticCurveTo(x+w,y,x+w,y+r);

  ctx.lineTo(x+w,y+h-r);
  ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);

  ctx.lineTo(x+r,y+h);
  ctx.quadraticCurveTo(x,y+h,x,y+h-r);

  ctx.lineTo(x,y+r);
  ctx.quadraticCurveTo(x,y,x+r,y);

  if(fill) ctx.fill();
  else ctx.stroke();
}

function drawEnd(){

  ctx.fillStyle = clear
    ? "rgba(255,255,120,0.35)"
    : "rgba(0,0,0,0.55)";

  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";

  ctx.textAlign = "center";

  ctx.font = "32px Yomogi";

  ctx.fillText(
    clear ? "クリア！" : "ゲームオーバー",
    canvas.width/2,
    180
  );

  ctx.font = "16px Yomogi";

  const msg = clear
    ? "だいすきをいっぱい食べられました。"
    : badMessages[lastBad];

  wrapText(msg,canvas.width/2,230,280,26);

  ctx.fillStyle = "white";

  roundRect(90,330,180,50,25,true);

  ctx.strokeStyle = "#d8bfa3";

  roundRect(90,330,180,50,25,false);

  ctx.fillStyle = "#444";

  ctx.font = "20px Yomogi";

  ctx.fillText(
    "もう一回あそぶ",
    canvas.width/2,
    362
  );

  ctx.textAlign = "start";
}

function update(){

  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let i=0;i<lanes;i++){

    ctx.fillStyle =
      i%2===0
      ? "#d0f0ff"
      : "#ffd6e7";

    ctx.fillRect(
      i*laneWidth,
      0,
      laneWidth,
      canvas.height
    );
  }

  if(gameOver || clear){

    drawEnd();
    return;
  }

  frame++;

  if(frame % 30 === 0){

    timer--;

    timeEl.textContent =
      formatTime(timer);

    if(timer<=0){
      clear = true;
    }
  }

  let spawnCount =
    1 + Math.floor(frame / 2400);

  spawnCount = Math.min(spawnCount,3);

  let spawnSpeed =
    Math.max(
      26,
      44 - Math.floor(frame/1800)
    );

  if(frame % spawnSpeed === 0){

    for(let i=0;i<spawnCount;i++){
      spawnItem();
    }
  }

  for(let i=effects.length-1;i>=0;i--){

    let e = effects[i];

    e.life--;

    if(e.heart){

      e.x += e.dx;
      e.y += e.dy;

      ctx.font = "20px sans-serif";

      ctx.fillText("💖",e.x,e.y);

    }
    else if(e.cx === undefined){

      e.x += e.dx;
      e.y += e.dy;

      ctx.fillStyle = "white";

      ctx.fillRect(e.x,e.y,3,3);

    }
    else{

      e.angle += e.speed;

      let x =
        e.cx + Math.cos(e.angle)*e.radius;

      let y =
        e.cy + Math.sin(e.angle)*e.radius;

      ctx.globalAlpha = e.alpha;

      ctx.fillStyle = e.color;

      ctx.fillRect(x,y,e.size,e.size);

      ctx.globalAlpha = 1;

      if(e.special && Math.random()<0.01){
        addBurst(x,y);
      }
    }

    if(e.life<=0){
      effects.splice(i,1);
    }
  }

  for(let i=falling.length-1;i>=0;i--){

    let f = falling[i];

    let speed =
      (f.good || f.special)
      ? 2
      : 2 + frame*0.0007;

    f.y += speed;

    let x =
      f.lane*laneWidth + 10;

    ctx.font = "28px sans-serif";

    ctx.fillText(f.emoji,x,f.y);

    if(f.good){
      addSparkle(x+15,f.y);
    }

    if(f.special){
      addSpecial(x+15,f.y);
    }

    if(
      f.y > canvas.height-60 &&
      f.lane === cat.lane
    ){

      let cx =
        f.lane*laneWidth + 20;

      let cy =
        canvas.height-60;

      if(f.special){

        lives =
          Math.min(9,lives+1);

        cat.power = 30;

        addSpecial(cx,cy);
        addBurst(cx,cy);

      }
      else if(f.good){

        score += 100;

        cat.happyTimer = 20;
        cat.bounce = 16;

        addHeart(cx,cy);

      }
      else{

        lives--;

        lastBad = f.emoji;

        cat.sadTimer = 18;
        cat.shake = 18;

        if(lives<=0){
          gameOver = true;
        }
      }

      updateLives();

      scoreEl.textContent = score;

      falling.splice(i,1);

      continue;
    }

    if(f.y > canvas.height){
      falling.splice(i,1);
    }
  }

  if(cat.happyTimer>0) cat.happyTimer--;
  if(cat.sadTimer>0) cat.sadTimer--;
  if(cat.bounce>0) cat.bounce--;
  if(cat.shake>0) cat.shake--;
  if(cat.power>0) cat.power--;

  let shake =
    cat.shake>0
    ? (Math.random()-0.5)*6
    : 0;

  let bounce =
    Math.sin(cat.bounce*0.8)*10;

  let face = "😺";

  if(cat.sadTimer>0){
    face = "🙀";
  }
  else if(cat.happyTimer>0){
    face = "😻";
  }

  let catX =
    cat.lane*laneWidth + 30;

  let catY =
    canvas.height - 20 - bounce;

  ctx.save();

  ctx.translate(catX + shake,catY);

  // 🌈🚬エフェクト
  if(cat.power>0){

    const glow =
      cat.power / 30;

    // 🌈360°虹オーラ
    const colors = [
      "255,80,80",
      "255,170,80",
      "255,255,120",
      "120,255,120",
      "120,220,255",
      "140,140,255",
      "255,120,255"
    ];

    for(let i=0;i<7;i++){

      ctx.beginPath();

      ctx.strokeStyle =
        `rgba(${colors[i]},${0.18*glow})`;

      ctx.lineWidth =
        18 - i*2;

      ctx.arc(
        10,
        -10,
        42 + i*4,
        0,
        Math.PI*2
      );

      ctx.stroke();
    }

    // 白い発光
    const shine =
      ctx.createRadialGradient(
        10,-10,10,
        10,-10,85
      );

    shine.addColorStop(
      0,
      `rgba(255,255,255,${0.25*glow})`
    );

    shine.addColorStop(
      1,
      "rgba(255,255,255,0)"
    );

    ctx.fillStyle = shine;

    ctx.beginPath();

    ctx.arc(10,-10,85,0,Math.PI*2);

    ctx.fill();

    // 金キラ
    for(let i=0;i<7;i++){

      const angle =
        frame*0.04 + i;

      const r =
        45 + Math.sin(frame*0.06+i)*10;

      const px =
        Math.cos(angle)*r;

      const py =
        Math.sin(angle)*r;

      ctx.globalAlpha =
        0.6 * glow;

      ctx.fillStyle = "gold";

      ctx.fillRect(px,py,5,5);
    }

    ctx.globalAlpha = 1;

    // じわっと巨大化
    let scale =
      1 + (cat.power/30)*0.35;

    ctx.scale(scale,scale);
  }

  ctx.font = "40px sans-serif";

  ctx.fillText(face,-20,0);

  ctx.restore();
}

function moveByDelta(dx){

  if(gameOver || clear) return;

  if(dx<0 && cat.lane>0){
    cat.lane--;
  }

  if(dx>0 && cat.lane<lanes-1){
    cat.lane++;
  }
}

let startX = null;

canvas.addEventListener("touchstart",e=>{
  startX = e.touches[0].clientX;
});

canvas.addEventListener("touchend",e=>{

  if(gameOver || clear){

    let rect =
      canvas.getBoundingClientRect();

    let x =
      e.changedTouches[0].clientX
      - rect.left;

    let y =
      e.changedTouches[0].clientY
      - rect.top;

    if(
      x>90 && x<270 &&
      y>330 && y<380
    ){
      resetGame();
    }

    return;
  }

  if(!startX) return;

  moveByDelta(
    e.changedTouches[0].clientX - startX
  );

  startX = null;
});

let mouseX = null;

canvas.addEventListener("mousedown",e=>{
  mouseX = e.clientX;
});

canvas.addEventListener("mouseup",e=>{

  if(gameOver || clear){

    let rect =
      canvas.getBoundingClientRect();

    let x = e.clientX - rect.left;
    let y = e.clientY - rect.top;

    if(
      x>90 && x<270 &&
      y>330 && y<380
    ){
      resetGame();
    }

    return;
  }

  if(mouseX===null) return;

  moveByDelta(e.clientX - mouseX);

  mouseX = null;
});

updateLives();
resetGame();

setInterval(update,30);

</script>

</body>
</html>
