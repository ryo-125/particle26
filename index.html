<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magical Particles - Gorgeous Edition</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0d1b3e, #1b0a2a, #050505);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        canvas {
            display: block;
            cursor: none; /* カーソルを消して粒子を目立たせる */
        }
    </style>
</head>
<body>

<canvas id="magicCanvas"></canvas>

<script>
    const canvas = document.getElementById('magicCanvas');
    const ctx = canvas.getContext('2d');

    let particlesArray = [];
    const mouse = { x: undefined, y: undefined, isOnScreen: false };
    let hueBase = 0; // 色を変化させるためのベース

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    // マウスが画面内にあるかどうかの判定を厳密化
    window.addEventListener('mouseenter', () => { mouse.isOnScreen = true; });
    window.addEventListener('mouseleave', () => { 
        mouse.isOnScreen = false;
        mouse.x = undefined;
        mouse.y = undefined;
    });
    window.addEventListener('mousemove', (e) => {
        mouse.isOnScreen = true;
        mouse.x = e.x;
        mouse.y = e.y;
    });

    class Particle {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            // 修正：サイズを大きくし、ばらつきを持たせて華やかに (3〜8程度)
            this.size = Math.random() * 5 + 3;
            
            // 速度：より四方に弾けるように
            this.speedX = (Math.random() - 0.5) * 4;
            this.speedY = (Math.random() - 0.5) * 4 - 1;
            
            // 色：生成時のマウス位置に合わせて変化
            this.hue = hueBase;
            this.color = `hsla(${this.hue}, 100%, 75%, 0.9)`;
            
            this.shrinkSize = Math.random() * 0.08 + 0.03;
            this.sparkle = Math.random() < 0.3; // キラキラ率アップ
        }

        update() {
            this.x += this.speedX;
            this.y += this.speedY;
            this.speedY += 0.05; // 少し重力を強めて「舞い落ちる」感を演出

            if (this.size > this.shrinkSize) {
                this.size -= this.shrinkSize;
            } else {
                this.size = 0;
            }
        }

        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            // 発光をより強く
            ctx.shadowBlur = this.sparkle ? 25 : 10;
            ctx.shadowColor = `hsl(${this.hue}, 100%, 70%)`;
            ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
            ctx.fill();
            ctx.shadowBlur = 0;
        }
    }

    function animate() {
        // 背景の残像（少しだけ濃くして粒子の鮮やかさを強調）
        ctx.fillStyle = 'rgba(10, 10, 25, 0.25)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // 色相を時間で回す
        hueBase += 2;

        // マウスが画面上にあるときだけ粒子を生成
        if (mouse.isOnScreen && mouse.x !== undefined) {
            for (let i = 0; i < 3; i++) {
                particlesArray.push(new Particle(mouse.x, mouse.y));
            }
        }

        for (let i = 0; i < particlesArray.length; i++) {
            particlesArray[i].update();
            particlesArray[i].draw();
            
            if (particlesArray[i].size <= 0.3) {
                particlesArray.splice(i, 1);
                i--;
            }
        }
        requestAnimationFrame(animate);
    }

    animate();
</script>

</body>
</html>
