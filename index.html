<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>レーン避けゲーム</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #333;
            color: white;
            font-family: sans-serif;
        }

        /* ゲーム画面全体 */
        #game-container {
            position: relative;
            width: 400px;
            height: 600px;
            background: white;
            border: 4px solid #fff;
            overflow: hidden;
            cursor: none;
        }

        /* 灰色と水色のレーン */
        .lane {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
        }
        .gray-lane { left: 0; background-color: #a0a0a0; }
        .blue-lane { left: 50%; background-color: #87ceeb; }

        /* スコア表示 */
        #score-board {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            color: #333;
            font-weight: bold;
            z-index: 10;
        }

        /* プレイヤー（茶色い物体） */
        #player {
            position: absolute;
            bottom: 40px;
            width: 50px;
            height: 50px;
            background-color: #8b4513; /* 茶色 */
            border-radius: 8px;
            z-index: 5;
        }

        /* 障害物（赤い物体） */
        .obstacle {
            position: absolute;
            width: 40px;
            height: 40px;
            background-color: #ff4500; /* 赤色 */
            border-radius: 50%;
            z-index: 4;
        }
    </style>
</head>
<body>

    <div id="game-container">
        <div id="score-board">Score: 0</div>
        <div class="lane gray-lane"></div>
        <div class="lane blue-lane"></div>
        <div id="player"></div>
    </div>

    <script>
        const container = document.getElementById('game-container');
        const player = document.getElementById('player');
        const scoreBoard = document.getElementById('score-board');
        
        let score = 0;
        let isGameOver = false;

        // プレイヤーの移動制限と追従
        container.addEventListener('mousemove', (e) => {
            if (isGameOver) return;
            const rect = container.getBoundingClientRect();
            let x = e.clientX - rect.left - (player.offsetWidth / 2);
            
            // 枠内のみに移動範囲を制限
            if (x < 0) x = 0;
            if (x > container.offsetWidth - player.offsetWidth) x = container.offsetWidth - player.offsetWidth;
            
            player.style.left = x + 'px';
        });

        // 障害物の生成
        function spawnObstacle() {
            if (isGameOver) return;

            const obs = document.createElement('div');
            obs.className = 'obstacle';
            // 左右どちらかのレーンにランダム生成
            const lanePos = Math.random() > 0.5 ? 75 : 275;
            obs.style.left = lanePos + 'px';
            obs.style.top = '-50px';
            container.appendChild(obs);

            let pos = -50;
            const speed = 5 + (score * 0.1);

            const timer = setInterval(() => {
                if (isGameOver) { clearInterval(timer); return; }
                
                pos += speed;
                obs.style.top = pos + 'px';

                // 衝突判定
                const pRect = player.getBoundingClientRect();
                const oRect = obs.getBoundingClientRect();

                if (oRect.bottom > pRect.top && 
                    oRect.top < pRect.bottom && 
                    oRect.left < pRect.right && 
                    oRect.right > pRect.left) {
                    gameOver();
                }

                if (pos > 600) {
                    clearInterval(timer);
                    container.removeChild(obs);
                    score++;
                    scoreBoard.innerText = "Score: " + score;
                }
            }, 20);
        }

        function gameOver() {
            isGameOver = true;
            alert("ゲーム終了！スコア: " + score);
            location.reload();
        }

        setInterval(spawnObstacle, 1000);
    </script>
</body>
</html>
